<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="IMG/icone_lista_de_tarefas_site.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/print.css">
    <title>Google lista de tarefas</title>
</head>
<body>
    <div class="botaoTema"><i class="fa-solid fa-moon"></i></div>
    <main class="containerListaDeTarefas">
        <header class="cabecalhoListaDeTarefas">
            <div class="botaoFiltrar"><i class="fa-solid fa-magnifying-glass fa-lg"></i></div>
            <h1 class="tituloListaDeTarefas">LISTA DE TAREFAS</h1>
            <div class="botaoLixeira"><i class="fa-solid fa-trash-can fa-lg"></i></div>
        </header>
        <div class="containerInputsBotoes">
            <input type="text" name="tarefa" id="tarefaUsuario" class="inputTarefas" placeholder="Nova tarefa...">
            <button class="botaoAdicionarTarefa">Adicionar tarefa</button>
            <button class="botaoLimparTarefas">Limpar tarefas</button>
        </div>
        <div class="containerMensagensExitoErro">
            <span class="mensagemErro">Não envie algo vazio !!!</span>
        </div>
        <div class="containerItensTarefa">
            <article class="itemTarefa">
                <div class="textosTarefa">
                    <span>1.</span>
                    <span>Varrer a casa</span>
                </div>
                <div class="botoesItemTarefa">
                    <button class="botaoOpcaoItemTarefa botaoHierarquiaTarefa"><i class="fa-solid fa-list-ol fa-lg"></i></button>
                    <button class="botaoOpcaoItemTarefa botaoEditarTarefa"><i class="fa-solid fa-pen-to-square fa-lg"></i></button>
                    <button class="botaoOpcaoItemTarefa botaoLimparTarefa"><i class="fa-solid fa-trash fa-lg"></i></button>
                </div>
            </article>
        </div>
    </main>
    <script src="JS/script.js"></script>
</body>
</html>
